name: Deploy Spring Boot to EC2 Auto Scaling (S3)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout source code
    - name: Checkout source
      uses: actions/checkout@v4

    # 2. Setup Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 3. Clean previous build artifacts (중요!)
    - name: Clean old builds
      run: rm -rf api_server/build/libs/*

    # 4. Gradle 권한 부여
    - name: Permission gradlew
      run: chmod +x gradlew
      working-directory: api_server

    # 5. Build Spring Boot JAR
    - name: Build Spring Boot (bootJar)
      run: ./gradlew clean bootJar -x test -x asciidoc
      working-directory: api_server

    # 6. AWS Credentials 설정
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1   # 👉 여기가 배포 리전

    # 7. 배포용 .env 파일 생성
    - name: Create env file
      run: |
        echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}" > env
        echo "SPRING_PROFILES_ACTIVE=prod" >> env
        echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> env
        echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> env
        echo "ENV CREATED:"
        cat env

    # 8. jar 파일 정확한 이름 선택
    - name: Find latest JAR
      id: findjar
      run: |
        JAR_PATH=$(ls -t api_server/build/libs/*.jar | grep -v "plain" | head -n 1)
        echo "JAR_PATH=$JAR_PATH" >> $GITHUB_OUTPUT

    # 9. S3 업로드
    - name: Upload JAR & ENV to S3
      run: |
        echo "Uploading JAR: ${{ steps.findjar.outputs.JAR_PATH }}"
        aws s3 cp "${{ steps.findjar.outputs.JAR_PATH }}" "s3://${{ secrets.S3_BUCKET_NAME }}/latest/app.jar" --acl private
        
        echo "Uploading .env"
        aws s3 cp "env" "s3://${{ secrets.S3_BUCKET_NAME }}/latest/.env" --acl private
        
        echo "Upload completed!"
    # 10. Launch Template 새 버전 생성
    - name: Create new Launch Template version
      run: |
        echo "Creating new Launch Template version..."
        aws ec2 create-launch-template-version \
          --launch-template-id ${{ secrets.LAUNCH_TEMPLATE_ID }} \
          --source-version '$Latest'

    # 11. ASG Instance Refresh 시작 (무중단 롤링 배포)
    - name: Start ASG Instance Refresh
      run: |
        echo "Starting ASG Instance Refresh..."
        aws autoscaling start-instance-refresh \
          --auto-scaling-group-name ${{ secrets.ASG_NAME }} \
          --preferences '{
            "InstanceWarmup": 300,
            "MinHealthyPercentage": 90
          }'
