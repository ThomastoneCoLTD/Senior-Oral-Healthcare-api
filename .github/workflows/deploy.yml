name: Deploy to EC2 (nohup)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JAR
        run: ./gradlew clean build -x test
        working-directory: api_server   # ✅ gradlew 위치 지정

      - name: Stop old process
        run: pkill -f 'java -jar' || true

      - name: Run new process
        run: |
          nohup java -jar api_server/build/libs/*.jar \
            --spring.profiles.active=dev \
            > app.log 2>&1 &
