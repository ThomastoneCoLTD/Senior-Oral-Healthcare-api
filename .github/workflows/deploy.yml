name: Deploy to EC2 (systemd)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted   # EC2에 설치된 runner에서 실행

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Give gradlew permission
        run: chmod +x gradlew
        working-directory: api_server

      - name: Build JAR
        run: ./gradlew clean build -x test -x asciidoctor
        working-directory: api_server

      - name: Copy JAR and rename to app.jar
        run: cp api_server/build/libs/*.jar /home/ec2-user/saas_dentix/app.jar

      - name: Restart systemd service
        run: sudo systemctl restart saas

      - name: Check status
        run: sudo systemctl status saas --no-pager
