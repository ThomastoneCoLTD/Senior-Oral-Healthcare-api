name: Deploy Spring Boot (api_server) to EC2 Auto Scaling (S3)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Give gradlew permission
        run: chmod +x gradlew
        working-directory: api_server

      - name: Build JAR inside api_server
        run: ./gradlew clean build -x test -x asciidoctor
        working-directory: api_server

      # 🎯 올바른 리전 설정 (싱가포르)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      # 🎯 .env 파일에 실제 필요한 환경변수 모두 포함
      - name: Create env file
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" > env
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> env
          echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}" >> env
          echo "SPRING_PROFILES_ACTIVE=prod" >> env

      - name: Upload jar & env to S3
        run: |
          JAR_PATH=$(ls api_server/build/libs/*-SNAPSHOT.jar | head -n 1)
          echo "Using JAR: $JAR_PATH"

          aws s3 cp "$JAR_PATH" "s3://${{ secrets.S3_BUCKET_NAME }}/latest/app.jar"
          aws s3 cp "env" "s3://${{ secrets.S3_BUCKET_NAME }}/latest/.env"

          echo "Upload complete!"
