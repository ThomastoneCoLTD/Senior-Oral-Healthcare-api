spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari: # connection-timeout :  pool에서 connect 얻을 때 최대 대기시간이며, 기본 30초임
      poolName: SpringBootJPAHikariCP
      minimum-idle: 3
      maximum-pool-size: 20 # 최대 커넥션 풀 허용 개수
      idle-timeout: 10000 # pool 에서 유휴 상태로 최대 유지시킬 수 있는 시간, minimum 이 maximum 보다 사이즈가 작을 때 동작함
      max-lifetime: 60000 # 커넥션 최대 유지시간 55
      connection-timeout: 10000
      validation-timeout: 10000 #커넥션이 유효한지 검사할 때 대기 시간을 지정한다. 이 값초은 connectionTimeout보다 작아야 한다. 허용 가능한 최소 값은 250이다.
      auto-commit: false # 커넥션 풀 auto commit 여부
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
      enabled: true
  mvc:
    view:
      prefix: /WEB-INF/view/
      suffix: .jsp
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    generate-ddl: false
    open-in-view: false
    hibernate:
      connection:
        provider_class: org.hibernate.hikaricp.internal.HikariCPConnectionProvider
      format_sql: true
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
      #use-new-id-generator-mappings: true # JPA 표준에 맞는 새로운 키 생성 전략을 사용함.
    properties:
      hibernate.connection.provider_disables_autocommit: true

  mail:
    host: smtp.sendgrid.net
    port: 587                      # STARTTLS
    username: apikey
    password: ${SENDGRID_API_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
      mail.debug: true
jwt:
  accessTokenKey: "j39sd9f39sd9f39sd9f39sd9f39sd9fs"
  refreshTokenKey: "kx9d9d9kd9dk9d9dk9d9dk9d9dk9d9dk"
  secret: "jwt"
  expiration: 604800000

server:
  tomcat:
    connection-timeout: 120000ms  # 요청 대기 시간 (기본 20000ms = 20초)
    keep-alive-timeout: 120000ms  # KeepAlive 연결 유지 시간
    max-swallow-size: 500MB
    max-http-form-post-size: 500MB
  forward-headers-strategy: native
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/api}
    encoding:
      charset: UTF-8
      force: true
    session:
      timeout: 60m
      cookie:
        http-only: true    # [cite: 251] 쿠키 속성 검사(HttpOnly) 해결 - 자바스크립트 접근 차단
        secure: true       # [cite: 346] 쿠키 속성 검사(Secure) 해결 - HTTPS에서만 전송
        same-site: lax     # [cite: 299] 쿠키 속성 검사(SameSite) 해결 - CSRF 방지 (Strict 또는 Lax 권장)
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

