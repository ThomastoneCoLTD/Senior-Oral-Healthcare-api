server:
  shutdown: graceful
  tomcat:
    # [수정] 7-2. Slowloris HTTP DoS 방어 설정
    # 기존 120000ms(2분)은 너무 길어 공격에 취약합니다. 20000ms(20초) 이하 권장
    connection-timeout: 20000ms
    keep-alive-timeout: 10000ms

    # [추가] 과도한 연결 요청 방어 (리소스 고갈 방지)
    max-connections: 8192
    accept-count: 100

    max-swallow-size: 500MB
    max-http-form-post-size: 500MB
  forward-headers-strategy: native
  servlet:
    encoding:
      charset: UTF-8
      force: true
    session:
      timeout: 60m
      cookie:
        # [확인] 보고서 87~158번 항목 (Cookie Attributes) - 이미 잘 작성되어 있습니다.
        http-only: true    # XSS 방지: 자바스크립트 접근 불가
        secure: true       # Sniffing 방지: HTTPS에서만 전송
        same-site: lax     # CSRF 방지: Cross-Site 요청 제한
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# [보안 권고] 운영 환경에서는 에러 스택 트레이스 노출 금지
